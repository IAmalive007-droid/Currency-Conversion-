<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HKD ⇄ INR Converter</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSEtEIElOUiBDb252ZXJ0ZXIiLCJzaG9ydF9uYW1lIjoiSEtELUlOUiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYxNzJhIiwidGhlbWVfY29sb3IiOiIjMGYxNzJhIiwiaWNvbnMiOltdfQ==">
<style>
  :root{
    --bg:#0f172a; --card:#16213e; --accent:#38bdf8; --accent2:#facc15;
    --text:#e2e8f0; --muted:#94a3b8; --border:#243149;
  }
  *{box-sizing:border-box;}
  html, body{width:100%; overflow-x:hidden;}
  body{
    margin:0; min-height:100vh; min-height:100dvh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg,#0f172a,#111c33);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text); padding:min(6vw,24px);
  }
  .card{
    width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
    border-radius:20px; padding:clamp(18px,5vw,28px); box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  h1{font-size:clamp(16px,4.5vw,18px); margin:0 0 4px; letter-spacing:.3px;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:22px;}
  .field{margin-bottom:16px;}
  label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px;}
  .row{display:flex; gap:8px; min-width:0;}
  input[type=number]{
    flex:1 1 auto; min-width:0; width:100%;
    background:#0f1729; border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; color:var(--text); font-size:16px; outline:none;
  }
  input[type=number]:focus{border-color:var(--accent);}
  .curr{
    flex:0 0 auto; width:clamp(56px,18vw,74px); display:flex; align-items:center; justify-content:center;
    background:#0f1729; border:1px solid var(--border); border-radius:10px;
    font-weight:600; color:var(--accent2); font-size:clamp(12px,3.4vw,14px);
  }
  input[readonly]{color:var(--muted); background:#0c1220;}
  .rate-line{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--muted); margin-top:18px; padding-top:14px;
    border-top:1px solid var(--border);
  }
  .rate-line span.val{color:var(--text); font-weight:600;}
  .status{font-size:11px; color:var(--muted); margin-top:6px; word-break:break-word;}
  .status.err{color:#f87171;}
  .status.ok{color:#4ade80;}
  button.refresh{
    background:none; border:1px solid var(--border); color:var(--muted);
    border-radius:8px; padding:8px 12px; font-size:12px; cursor:pointer;
    min-height:36px; -webkit-tap-highlight-color:transparent;
  }
  button.refresh:hover, button.refresh:active{color:var(--accent); border-color:var(--accent);}
  .manual{margin-top:10px;}
  .manual input{width:100%; background:#0f1729; border:1px solid var(--border); border-radius:8px; padding:10px; color:var(--text); font-size:16px;}
  .install-btn{
    width:100%; margin-top:20px; padding:13px; border:none; border-radius:12px;
    background:linear-gradient(90deg,var(--accent),#818cf8); color:#0f172a; font-weight:700;
    font-size:15px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  }
  .install-btn:active{opacity:.85;}

  @media (max-width:380px){
    .curr{font-size:11px;}
    .rate-line{font-size:11px;}
  }
</style>
</head>
<body>
  <div class="card">
    <h1>HKD → INR Converter</h1>
    <div class="sub">Live mid-market rate, editable manually if offline.</div>

    <div class="field">
      <label>Hong Kong Dollar</label>
      <div class="row">
        <input type="number" id="hkd" value="1" step="any">
        <div class="curr">HKD</div>
      </div>
    </div>

    <div class="field">
      <label>Indian Rupee</label>
      <div class="row">
        <input type="number" id="inr" value="0" step="any" readonly>
        <div class="curr">INR</div>
      </div>
    </div>

    <div class="rate-line">
      <span>1 HKD = <span class="val" id="rateDisplay">…</span> INR</span>
      <button class="refresh" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="status" id="status">Fetching live rate…</div>

    <div class="manual">
      <label style="margin-top:12px;">Manual rate override (1 HKD = ? INR)</label>
      <input type="number" id="manualRate" step="any" placeholder="e.g. 10.85">
    </div>

    <button id="installBtn" class="install-btn" style="display:none;">📲 Install App</button>
    <div class="status" id="installStatus"></div>
  </div>

<script>
let rate = null; // 1 HKD in INR
const hkdInput = document.getElementById('hkd');
const inrInput = document.getElementById('inr');
const rateDisplay = document.getElementById('rateDisplay');
const statusEl = document.getElementById('status');
const manualRate = document.getElementById('manualRate');
let direction = 'hkd_to_inr'; // which field user last edited

function recalc(){
  if(!rate) return;
  const v = parseFloat(hkdInput.value);
  inrInput.value = isNaN(v) ? '' : (v * rate).toFixed(2);
}

hkdInput.addEventListener('input', recalc);

manualRate.addEventListener('input', () => {
  const v = parseFloat(manualRate.value);
  if(!isNaN(v) && v > 0){
    rate = v;
    rateDisplay.textContent = rate.toFixed(4);
    statusEl.textContent = 'Using manual rate.';
    statusEl.className = 'status';
    recalc();
  }
});

async function fetchRate(){
  statusEl.textContent = 'Fetching live rate…';
  statusEl.className = 'status';
  try{
    const res = await fetch('https://open.er-api.com/v6/latest/HKD');
    if(!res.ok) throw new Error('Bad response');
    const data = await res.json();
    if(data.result !== 'success' || !data.rates || !data.rates.INR){
      throw new Error('Malformed data');
    }
    rate = data.rates.INR;
    rateDisplay.textContent = rate.toFixed(4);
    manualRate.value = '';
    const updated = data.time_last_update_utc || '';
    statusEl.textContent = 'Live rate loaded' + (updated ? ' · ' + updated : '');
    statusEl.className = 'status ok';
    recalc();
  }catch(e){
    statusEl.textContent = 'Could not fetch live rate. Enter one manually below.';
    statusEl.className = 'status err';
    rateDisplay.textContent = '—';
  }
}

document.getElementById('refreshBtn').addEventListener('click', fetchRate);
fetchRate();

// Register a trivial service worker inline (needed for real PWA installability once hosted)
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  const swCode = `self.addEventListener('fetch', e => {});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// Install button logic
const installBtn = document.getElementById('installBtn');
const installStatus = document.getElementById('installStatus');
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
  installStatus.textContent = '';
});

installBtn.addEventListener('click', async () => {
  if(!deferredPrompt){
    installStatus.textContent = 'Install not available yet — make sure this page is hosted over https, not opened as a local file.';
    installStatus.className = 'status err';
    return;
  }
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;
  if(choice.outcome === 'accepted'){
    installStatus.textContent = 'App installed!';
    installStatus.className = 'status ok';
  } else {
    installStatus.textContent = 'Install dismissed.';
    installStatus.className = 'status';
  }
  deferredPrompt = null;
  installBtn.style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  installStatus.textContent = 'App installed!';
  installStatus.className = 'status ok';
  installBtn.style.display = 'none';
});

// If browser doesn't fire beforeinstallprompt (e.g. iOS Safari, or file:// pages),
// still show the button after a short delay so user gets a helpful message instead of nothing.
setTimeout(() => {
  if(!deferredPrompt && installBtn.style.display === 'none'){
    installBtn.style.display = 'block';
  }
}, 2500);
</script>
</body>
</html>
